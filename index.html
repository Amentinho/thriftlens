<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080810"/>
  <title>ThriftLens</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#080810;overflow:hidden}
    body{font-family:'DM Mono',monospace;color:#e8e8f0}
    #app{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:430px;margin:0 auto}
    input,button{-webkit-appearance:none;outline:none;font-family:inherit}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{display:none}

    #header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;
      border-bottom:1px solid #1a1a2e;background:rgba(8,8,16,.97);position:sticky;top:0;z-index:100}
    .logo{font-size:15px;letter-spacing:4px;color:#8080a0;font-weight:300}
    .logo b{color:#00ff87;font-weight:700;letter-spacing:2px}
    .tabs{display:flex;gap:4px}
    .tab{background:transparent;border:1px solid #1a1a2e;color:#666;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px}
    .tab.active{background:#00ff8710;border-color:#00ff87;color:#00ff87}

    .screen{display:none;padding:16px;padding-bottom:60px;animation:fadeIn .3s ease}
    .screen.visible{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes scanline{0%{top:20%}50%{top:75%}100%{top:20%}}

    .card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:16px;margin-bottom:12px}
    .lbl{display:block;font-size:10px;letter-spacing:2px;color:#00ff87;margin-bottom:6px;text-transform:uppercase}
    .hint{font-size:11px;color:#555;margin-bottom:10px;line-height:1.6}
    .section-title{font-size:11px;letter-spacing:4px;color:#8080a0;margin-bottom:16px;text-transform:uppercase}

    #cam-screen{display:none;flex-direction:column}
    #cam-screen.visible{display:flex}
    #cam-wrap{position:relative;width:100%;background:#000;flex-shrink:0}
    #video{width:100%;display:block;max-height:60vh;object-fit:cover}
    #cam-overlay{position:absolute;inset:0;pointer-events:none}
    .corner{position:absolute;width:24px;height:24px;border-color:#00ff87}
    #scan-line{position:absolute;left:12%;right:12%;height:2px;
      background:linear-gradient(90deg,transparent,#00ff87,transparent);
      display:none;animation:scanline 1.8s ease-in-out infinite}
    #cam-status{position:absolute;bottom:0;left:0;right:0;padding:8px 16px;
      background:linear-gradient(transparent,rgba(8,8,16,.9));font-size:12px;color:#00ff87;letter-spacing:1px}
    #manual-btn{position:absolute;bottom:10px;right:12px;width:54px;height:54px;border-radius:50%;
      background:#00ff87;border:none;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center}

    #detail-screen{display:none;padding:16px;padding-bottom:120px;animation:fadeIn .3s ease}
    #detail-screen.visible{display:block}
    #detail-thumb{width:88px;height:88px;object-fit:cover;border-radius:12px;border:2px solid #1a1a2e;flex-shrink:0}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:1px;margin:2px}
    .badge.green{background:#00ff8715;border:1px solid #00ff8740;color:#00ff87}
    .badge.gray{background:#ffffff08;border:1px solid #2a2a3e;color:#666}
    .prop-bar-bg{height:8px;background:#080810;border-radius:4px;overflow:hidden;margin:8px 0}
    .prop-bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
    .platform-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #080810}
    .buy-btn{padding:20px 0;border-radius:16px;border:2px solid;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;flex:1}
    .buy-btn.yes{border-color:#00ff87;background:#00ff8720;color:#00ff87}
    .buy-btn.no{border-color:#ff4444;background:#ff444420;color:#ff4444}
    .skip-btn{width:100%;margin-top:12px;padding:14px;border-radius:12px;border:1px solid #2a2a3e;background:transparent;color:#555;font-size:12px;cursor:pointer}

    .stat-box{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:10px;padding:10px 8px;text-align:center}
    .stat-val{font-size:18px;font-weight:700;line-height:1.2}
    .stat-lbl{font-size:9px;color:#555;margin-top:3px;letter-spacing:1px;text-transform:uppercase}
    .hist-card{display:flex;gap:12px;background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:12px;margin-bottom:10px}
    .hist-thumb-wrap{position:relative;flex-shrink:0}
    .hist-thumb{width:66px;height:66px;object-fit:cover;border-radius:8px}
    .dec-dot{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

    .chip{padding:7px 14px;border-radius:20px;border:1px solid #2a2a3e;background:transparent;color:#666;cursor:pointer;font-size:12px}
    .chip.active{background:#00ff8720;border-color:#00ff87;color:#00ff87}
    .toggle-wrap{display:flex;justify-content:space-between;align-items:center}
    .toggle{width:46px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;padding:2px;display:flex;align-items:center;transition:background .3s}
    .toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
    .cta-btn{width:100%;padding:16px;background:linear-gradient(135deg,#00ff87,#00ccff);border:none;border-radius:12px;color:#080810;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:2px;margin-top:8px}
    .chips-row{display:flex;gap:8px;flex-wrap:wrap}
    .err-box{margin:16px;padding:14px;background:#ff444415;border:1px solid #ff444440;border-radius:10px;font-size:12px;color:#ff6666}
    .calc-box{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:16px;margin-bottom:16px}
    .price-input{flex:1;background:#080810;border:1px solid #2a2a3e;border-radius:8px;padding:12px;color:#e8e8f0;font-size:20px;width:100%}
    .signal-box{padding:10px 14px;border-radius:10px;border:1px solid;font-size:13px;font-weight:700;text-align:center;flex-shrink:0;min-width:80px}
    .live-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:#00ff8720;color:#00ff87;margin-left:4px}
    .est-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:#2a2a2a;color:#555;margin-left:4px}
    .enrich-note{text-align:center;font-size:10px;padding:8px 0;margin-bottom:12px}
    .empty{text-align:center;color:#444;padding:60px 20px;font-size:14px}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px}
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="logo">🏷️ THRIFT<b>LENS</b></div>
    <div class="tabs">
      <button class="tab active" id="tab-cam"     onclick="showScreen('cam')">📷</button>
      <button class="tab"        id="tab-history"  onclick="showScreen('history')">🗂 <span id="scan-count"></span></button>
      <button class="tab"        id="tab-prefs"    onclick="showScreen('prefs')">⚙️</button>
    </div>
  </div>

  <!-- CAMERA -->
  <div id="cam-screen" class="screen visible">
    <div id="cam-wrap">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div id="cam-overlay">
        <div class="corner" style="position:absolute;top:18%;left:12%;border-top:3px solid;border-left:3px solid"></div>
        <div class="corner" style="position:absolute;top:18%;right:12%;border-top:3px solid;border-right:3px solid"></div>
        <div class="corner" style="position:absolute;bottom:18%;left:12%;border-bottom:3px solid;border-left:3px solid"></div>
        <div class="corner" style="position:absolute;bottom:18%;right:12%;border-bottom:3px solid;border-right:3px solid"></div>
        <div id="scan-line"></div>
      </div>
      <div id="cam-status">Starting camera...</div>
      <button id="manual-btn" onclick="doScan()">📸</button>
      <button id="barcode-btn" onclick="startBarcodeMode()" style="position:absolute;top:10px;left:12px;padding:6px 12px;border-radius:20px;background:#ffd600;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700;letter-spacing:1px">📦 BARCODE</button>
    </div>
    <div id="cam-err"></div>
  </div>

  <!-- DETAIL -->
  <div id="detail-screen">
    <div style="display:flex;gap:14px;margin-bottom:20px;align-items:flex-start">
      <img id="detail-thumb" src="" alt=""/>
      <div style="flex:1">
        <div id="detail-brand" style="font-size:22px;font-weight:700;line-height:1.2"></div>
        <div id="detail-sub"   style="font-size:12px;color:#8080a0;margin-top:4px"></div>
        <div id="detail-badges" style="margin-top:8px"></div>
      </div>
    </div>

    <div class="card" style="text-align:center;margin-bottom:16px">
      <div style="font-size:10px;letter-spacing:3px;color:#8080a0;text-transform:uppercase;margin-bottom:6px">Weighted Resale Price</div>
      <div style="font-size:48px;font-weight:700;line-height:1" id="detail-price">—</div>
      <div id="detail-range" style="font-size:12px;color:#555;margin-top:8px"></div>
      <div id="detail-note" class="enrich-note" style="margin-top:8px"></div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:10px;letter-spacing:2px;color:#8080a0;text-transform:uppercase">Sell Propensity</span>
        <span id="prop-pct" style="font-size:16px;font-weight:700"></span>
      </div>
      <div class="prop-bar-bg"><div id="prop-bar" class="prop-bar-fill" style="width:0%"></div></div>
      <div id="prop-listings" style="font-size:11px;color:#555;margin-top:4px"></div>
    </div>

    <div id="platforms-list" class="card" style="padding:4px 0;margin-bottom:16px"></div>

    <div class="calc-box">
      <div style="font-size:10px;letter-spacing:2px;color:#8080a0;text-transform:uppercase;margin-bottom:12px">💶 Seller's asking price</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <input class="price-input" type="number" id="mkt-price" placeholder="€ e.g. 15" oninput="updateSignal()"/>
        <div class="signal-box" id="signal-box" style="display:none"></div>
      </div>
      <div id="thresholds" style="display:flex;justify-content:space-between;font-size:10px;color:#555"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <button class="buy-btn yes" onclick="recordDecision('buy')">✅ BUY</button>
      <button class="buy-btn no"  onclick="recordDecision('pass')">❌ PASS</button>
    </div>
    <button class="skip-btn" onclick="recordDecision(null)">📷 Skip &amp; scan next</button>
    <button onclick="shareWhatsApp()" style="width:100%;margin-top:10px;padding:16px;border-radius:12px;border:2px solid #25D366;background:#25D36622;color:#25D366;font-size:15px;font-family:inherit;cursor:pointer;font-weight:700">
      📲 Share via WhatsApp
    </button>
  </div>

  <!-- HISTORY -->
  <div id="history-screen" class="screen">
    <div class="stats-grid" id="stats-grid" style="display:none"></div>
    <div class="section-title">All Scans</div>
    <div id="history-list"><div class="empty">No scans yet. Go find some deals! 🧺</div></div>
  </div>

  <!-- PREFERENCES -->
  <div id="prefs-screen" class="screen">
    <div class="section-title">Preferences</div>
    <div class="card">
      <label class="lbl">Auto-scan interval</label>
      <p class="hint">How often to capture a frame automatically.</p>
      <div class="chips-row" id="interval-chips"></div>
    </div>
    <div class="card toggle-wrap">
      <div>
        <label class="lbl" style="margin-bottom:2px">Auto-scan</label>
        <p class="hint" style="margin-bottom:0">Continuous or manual tap.</p>
      </div>
      <button class="toggle" id="autoscan-toggle" onclick="toggleAutoScan()">
        <div class="toggle-knob" id="toggle-knob"></div>
      </button>
    </div>
    <button class="cta-btn" onclick="showScreen('cam')">📷 Start Scanning</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG — keys live in Cloudflare Worker, not here
// ═══════════════════════════════════════════════════════════════════
const WORKER_URL = "https://thriftlens.andrea-amenta87.workers.dev";

const PLATFORMS = {
  vinted: { name:"Vinted",  color:"#09b1ba", emoji:"👗" },
  ebay:   { name:"eBay EU", color:"#e53238", emoji:"🛒" },
};

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let prefs = { interval:3, autoScan:true };
try { prefs = { ...prefs, ...JSON.parse(localStorage.getItem("tl_prefs")||"{}") }; } catch(e){}

let currentItem=null, currentPrices=null, currentScan=null, currentB64=null;
let scanning=false, lastScanTime=0, scanTimer=null, stream=null;

// ═══════════════════════════════════════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════════════════════════════════════
function openDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open("thriftlens",1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("scans")) {
        const s = db.createObjectStore("scans",{keyPath:"id"});
        s.createIndex("category","category",{unique:false});
        s.createIndex("brand","brand",{unique:false});
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbSave(scan) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const tx = db.transaction("scans","readwrite");
    tx.objectStore("scans").put(scan);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function dbAll() {
  const db = await openDB();
  return new Promise((res,rej) => {
    const req = db.transaction("scans","readonly").objectStore("scans").getAll();
    req.onsuccess = e => res(e.target.result.reverse());
    req.onerror = rej;
  });
}
async function dbStats() {
  const all = await dbAll();
  const bought=all.filter(r=>r.decision==="buy").length;
  const passed=all.filter(r=>r.decision==="pass").length;
  const cats={};
  all.forEach(r=>{ cats[r.category]=(cats[r.category]||0)+1; });
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";
  return {total:all.length, bought, passed, topCat};
}

// ═══════════════════════════════════════════════════════════════════
// SCREEN NAV
// ═══════════════════════════════════════════════════════════════════
function showScreen(name) {
  document.getElementById("cam-screen").classList.remove("visible");
  document.getElementById("detail-screen").classList.remove("visible");
  document.getElementById("history-screen").classList.remove("visible");
  document.getElementById("prefs-screen").classList.remove("visible");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if (name==="cam") {
    document.getElementById("cam-screen").classList.add("visible");
    document.getElementById("tab-cam").classList.add("active");
    startCamera();
  } else if (name==="detail") {
    document.getElementById("detail-screen").classList.add("visible");
    document.getElementById("tab-cam").classList.add("active");
    stopCamera();
  } else if (name==="history") {
    document.getElementById("history-screen").classList.add("visible");
    document.getElementById("tab-history").classList.add("active");
    stopCamera(); renderHistory();
  } else if (name==="prefs") {
    document.getElementById("prefs-screen").classList.add("visible");
    document.getElementById("tab-prefs").classList.add("active");
    stopCamera();
  }
}

// ═══════════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════════
async function startCamera() {
  clearInterval(scanTimer);
  if (stream) return;
  setStatus("Starting camera...");
  try {
    try {
      stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:"environment"},width:{ideal:1280}}});
    } catch(e) {
      stream = await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280}}});
    }
    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();
    setStatus(prefs.autoScan ? `⚡ Auto-scanning every ${prefs.interval}s` : "Tap 📸 to scan");
    document.getElementById("manual-btn").style.display = prefs.autoScan ? "none" : "flex";
    if (prefs.autoScan) scanTimer = setInterval(doScan, prefs.interval*1000);
  } catch(e) {
    setErr("Camera blocked. Open in Safari and allow camera. " + e.message);
  }
}

function stopCamera() {
  clearInterval(scanTimer);
  stopBarcodeMode();
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
}

function captureFrame() {
  const video=document.getElementById("video"), canvas=document.getElementById("canvas");
  if (!video||video.readyState<2) return null;
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);
  return canvas.toDataURL("image/jpeg",0.82).split(",")[1];
}

function setStatus(msg) { const el=document.getElementById("cam-status"); if(el) el.textContent=msg; }
function setErr(msg) { const el=document.getElementById("cam-err"); if(el){el.className="err-box";el.textContent=msg;} }

// ═══════════════════════════════════════════════════════════════════
// VISION PROMPT
// ═══════════════════════════════════════════════════════════════════
const VISION_PROMPT = `You are a secondhand resale expert. Identify the item in the image for pricing.
Return ONLY valid JSON, no markdown:
{
  "brand": "exact brand/author or null",
  "model": "exact model/title or null",
  "category": "clothing|shoes|bag|camera|watch|book|vinyl|electronics|antique|toy|jewelry|accessory|other",
  "subcategory": "specific type e.g. jeans, novel, film camera",
  "color": "main color",
  "condition_estimate": "new|excellent|good|fair|poor",
  "size_visible": null,
  "gender": "men|women|unisex|unknown|na",
  "search_query": "specific title/model + category word. Rules: BOOKS→ key title words + libro/book (e.g. 'celda luciernaga libro' or 'confessions forty fup book'). CAMERAS→ brand + model + camera (e.g. 'Olympus XA camera'). CLOTHING→ brand + type (e.g. 'Levi 501 jeans'). WATCHES→ brand + model + watch (e.g. 'Casio G-Shock watch'). VINYL→ artist + album + vinyl. Always include the specific title or model — never use ONLY generic words like libro, book, camera, watch alone.",
  "confidence": 0.9,
  "is_luxury": false,
  "is_streetwear_sneaker": false,
  "is_camera_watch_collectible": false
}
Always return full JSON. Only {"error":"no_item"} if image is completely blank.`;

async function identifyItem(b64) {
  const res = await fetch(WORKER_URL+"/vision", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages:[{role:"user",content:[
      {type:"text",text:VISION_PROMPT},
      {type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64,detail:"low"}}
    ]}]}),
    // timeout via fetchWithTimeout
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  const text = (data.choices?.[0]?.message?.content||"{}").replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

// ═══════════════════════════════════════════════════════════════════
// PRICE SIMULATION (fallback)
// ═══════════════════════════════════════════════════════════════════
function simulatePrices(platform, query) {
  const q = query.toLowerCase();
  let base = 20;
  if (/olympus xa/.test(q))             base=110;
  else if (/olympus mju|stylus/.test(q)) base=85;
  else if (/canon ae.1/.test(q))         base=130;
  else if (/leica/.test(q))              base=800;
  else if (/polaroid/.test(q))           base=65;
  else if (/rolex/.test(q))              base=3500;
  else if (/casio g.shock/.test(q))      base=55;
  else if (/seiko/.test(q))              base=120;
  else if (/film camera|analog/.test(q)) base=60;
  else if (/nike|adidas/.test(q))        base=48;
  else if (/levi/.test(q))               base=34;
  else if (/gucci|prada|hermes/.test(q)) base=320;
  else if (/zara|h&m|mango/.test(q))     base=12;
  else if (/jordan|yeezy/.test(q))       base=190;
  else if (/ralph lauren|lacoste/.test(q))base=42;
  else if (/libro|novela|book/.test(q))  base=8;
  else if (/vinyl|disco|lp/.test(q))     base=15;
  if (/vintage|retro/.test(q)) base*=1.4;
  if (/jacket|coat/.test(q))   base*=1.5;

  const mult = {vinted:0.82, ebay:0.95};
  const m = mult[platform]||1;
  const count = 8+Math.floor(Math.random()*10);
  const prices = Array.from({length:count},()=>Math.round(base*m*(0.7+Math.random()*.65)*100)/100);
  const favorites = Array.from({length:count},()=>Math.floor(Math.random()*20));
  return {prices,favorites,count,simulated:true};
}

// ═══════════════════════════════════════════════════════════════════
// VINTED — via worker (run-sync, working pattern from before)
// ═══════════════════════════════════════════════════════════════════
async function fetchVinted(query) {
  // Step 1: Ask worker to start Apify run (instant, <1s, token stays in worker)
  // Step 2: Poll Apify run status directly from browser (public endpoint, no token)
  // Step 3: Fetch dataset directly from browser (public endpoint, no token)
  try {
    console.log("Vinted: starting run for", query);
    const startRes = await fetchWithTimeout(WORKER_URL+"/vinted/start", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query}),
    }, 8000);
    if (!startRes.ok) {
      const errText = await startRes.text().catch(()=>"(no body)");
      console.warn("Vinted start failed:", startRes.status, errText);
      return simulatePrices("vinted",query);
    }
    const {runId, datasetId, cleanQuery} = await startRes.json();
    if (!runId) { console.warn("Vinted: no runId returned"); return simulatePrices("vinted",query); }
    console.log("Vinted: run started", runId, "cleanQuery:", cleanQuery);

    // Step 2: Poll status via worker every 5s, up to 90s
    const deadline = Date.now() + 90000;
    let status = "RUNNING";
    let pollErrors = 0;
    while (Date.now() < deadline) {
      await new Promise(r => setTimeout(r, 5000));
      try {
        const statusRes = await fetchWithTimeout(WORKER_URL+"/vinted/status?runId="+runId, {}, 8000);
        if (!statusRes.ok) { pollErrors++; console.warn("Vinted poll HTTP:", statusRes.status); continue; }
        const statusData = await statusRes.json();
        if (statusData.error) { pollErrors++; console.warn("Vinted poll error:", statusData.error); continue; }
        status = statusData.status || "RUNNING";
        console.log("Vinted status:", status, "elapsed:", Math.round((Date.now()-deadline+90000)/1000)+"s");
        if (status === "SUCCEEDED" || status === "FAILED" || status === "ABORTED" || status === "TIMED-OUT") break;
      } catch(e) { pollErrors++; console.warn("Vinted poll exception:", e.message); }
    }

    if (status !== "SUCCEEDED") { console.warn("Vinted run ended:", status); return simulatePrices("vinted",query); }

    // Step 3: Fetch dataset via worker (token stays in worker)
    const dataRes = await fetchWithTimeout(WORKER_URL+"/vinted/results?datasetId="+datasetId, {}, 10000);
    const items = await dataRes.json();
    console.log("Vinted: got", items.length, "items");
    if (!Array.isArray(items)||!items.length) return simulatePrices("vinted",query);

    const prices = items
      .map(i => typeof i.price==="number" ? i.price : parseFloat(String(i.price||0).replace(/[^0-9.]/g,"")))
      .filter(p => p > 0.5 && p < 5000);
    if (!prices.length) { console.warn("Vinted: no prices. Keys:", Object.keys(items[0]||{}).join(",")); return simulatePrices("vinted",query); }
    const favorites = items.map(i=>i.favouriteCount||i.favourite_count||0);
    console.log("Vinted ✓ LIVE:", prices.length, "prices:", prices.slice(0,5));
    return {prices, favorites, count:prices.length, simulated:false};

  } catch(e) {
    console.warn("Vinted exception:", e.message);
    return simulatePrices("vinted",query);
  }
}

async function fetchEbay(query) {

    console.log("eBay: response status", res.status);

  }
}

// ═══════════════════════════════════════════════════════════════════
// AGGREGATION
// ═══════════════════════════════════════════════════════════════════
function aggregate(platformData, item) {
  const results={};
  let allPrices=[];
  for (const [p,d] of Object.entries(platformData)) {
    if (!d?.prices?.length) continue;
    const s=[...d.prices].sort((a,b)=>a-b);
    const median=s[Math.floor(s.length*.5)];
    const p25=s[Math.floor(s.length*.25)];
    const avgFav=d.favorites.reduce((a,b)=>a+b,0)/(d.favorites.length||1);
    results[p]={median,p25,avg:s.reduce((a,b)=>a+b,0)/s.length,count:d.count,avgFav,simulated:d.simulated};
    allPrices=allPrices.concat(d.prices);
  }
  if (!allPrices.length) return null;

  // Vinted weighted higher (our sell target)
  const W={vinted:2.5,ebay:1.2};
  let ws=0,wt=0;
  for (const [p,d] of Object.entries(results)){const w=W[p]||1;ws+=d.median*w;wt+=w;}
  const wm=Math.round(ws/wt*100)/100;

  const as=[...allPrices].sort((a,b)=>a-b);
  const overallP25=Math.round(as[Math.floor(as.length*.25)]*100)/100;
  const overallMedian=Math.round(as[Math.floor(as.length*.5)]*100)/100;
  const allFavs=Object.values(results).map(r=>r.avgFav);
  const avgFav=allFavs.reduce((a,b)=>a+b,0)/(allFavs.length||1);
  const totalListings=Object.values(results).reduce((s,r)=>s+r.count,0);
  const demand=Math.min(avgFav/18,1);
  const supply=Math.max(1-totalListings/150,.1);
  const bonus=(item?.is_luxury?.15:0)+(item?.is_streetwear_sneaker?.10:0)+(item?.is_camera_watch_collectible?.08:0);
  const prop=Math.min(Math.round((demand*.45+supply*.38+bonus+.17)*100),96);

  return {
    platforms:results,weightedMedian:wm,overallP25,overallMedian,
    propensity:prop,totalListings,
    buyThreshold:Math.round(wm*.45*100)/100,
    maybeThreshold:Math.round(wm*.60*100)/100,
    simulated:Object.values(results).some(r=>r.simulated),
    enriching:false
  };
}

async function doScan() {
  // If barcode mode active, use AI to read barcode instead of identifying item
  if (barcodeModeActive) { await scanBarcode(); return; }

  const now=Date.now();
  if (scanning||now-lastScanTime<prefs.interval*1000) return;
  const b64=captureFrame();
  if (!b64) return;
  lastScanTime=now; scanning=true;
  setScanLine(true);
  document.getElementById("cam-err").textContent="";
  document.getElementById("cam-err").className="";

  try {
    setStatus("🔍 Identifying item...");
    const item = await identifyItem(b64);
    if (item.error||(!item.brand&&!item.subcategory)) {
      setStatus("👁 No item detected — point closer");
      setTimeout(()=>setStatus(prefs.autoScan?`⚡ Auto-scanning every ${prefs.interval}s`:"Tap 📸 to scan"),2500);
      scanning=false; setScanLine(false); return;
    }
    if (item.confidence<0.40||!item.brand) { scanning=false; setScanLine(false); showClarify(item,b64); return; }

    const label=[item.brand,item.model||item.subcategory].filter(Boolean).join(" ");
    setStatus("✓ "+label+" — fetching prices...");
    await fetchAndShow(item,b64);
  } catch(e) {
    setErr("Error: "+e.message);
    setStatus("Tap 📸 to try again");
  } finally { scanning=false; setScanLine(false); }
}

function setScanLine(on) { document.getElementById("scan-line").style.display=on?"block":"none"; }

// ═══════════════════════════════════════════════════════════════════
// FETCH & SHOW — instant estimate, then real prices
// ═══════════════════════════════════════════════════════════════════
// Timeout helper — works on all Safari versions
function fetchWithTimeout(url, opts, ms) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error("timeout_"+ms)), ms);
    fetch(url, opts)
      .then(r => { clearTimeout(timer); resolve(r); })
      .catch(e => { clearTimeout(timer); reject(e); });
  });
}

async function fetchAndShow(item, b64) {
  const q = item.search_query;

  // Phase 0: show estimate instantly + show loading note
  const simRaw = { vinted:simulatePrices("vinted",q), ebay:simulatePrices("ebay",q) };
  const simAgg = aggregate(simRaw, item);
  if (simAgg) {
    currentItem=item; currentB64=b64;
    currentPrices={...simAgg,enriching:true,simulated:true};
    currentScan={
      id:Date.now(),ts:new Date().toISOString(),tsDisplay:new Date().toLocaleTimeString(),
      brand:item.brand||"Unknown",model:item.model||"",
      category:item.category||"other",subcategory:item.subcategory||"",
      color:item.color||"",condition:item.condition_estimate||"good",
      search_query:q,prices:simAgg,thumb:b64,decision:null,mktPrice:null
    };
    renderDetail();
    showScreen("detail");
    // Show loading status immediately
    const note = document.getElementById("detail-note");
    if (note) { note.style.color="#ffd600"; note.textContent="⏳ Fetching real prices (30-60s)..."; }
  }

  // Phase 1: fire both real fetches in parallel, update as each arrives
  const raw={};
  let doneCount=0;

  const doFetch = async (platform, fetchFn) => {
    try {
      const result = await fetchFn(q);
      raw[platform] = result;
      doneCount++;
      const note = document.getElementById("detail-note");
      if (note && result && !result.simulated) {
        note.style.color="#ffd600";
        note.textContent="⏳ Got "+platform+" ("+doneCount+"/2) — waiting for more...";
      }
      updatePricesLive(raw, item);
    } catch(e) {
      raw[platform] = simulatePrices(platform, q);
      doneCount++;
    }
  };

  await Promise.all([
    doFetch("vinted", fetchVinted),
    doFetch("ebay",   fetchEbay),
  ]);

  // Final update
  const finalAgg = aggregate(raw,item);
  if (finalAgg) {
    currentPrices={...finalAgg,enriching:false};
    if (currentScan) { currentScan.prices=finalAgg; dbSave(currentScan).catch(()=>{}); }
    dbAll().then(rows=>{ document.getElementById("scan-count").textContent=rows.length||""; });
    updateDetailPrices();
  }
}

function updatePricesLive(raw, item) {
  const agg = aggregate(raw, item);
  if (agg) {
    currentPrices={...agg,enriching:true};
    updateDetailPrices();
  }
}

function renderDetail() {
  const item=currentItem, prices=currentPrices;
  if (!item||!prices) return;
  const thumb=document.getElementById("detail-thumb");
  thumb.src=currentB64?"data:image/jpeg;base64,"+currentB64:"";
  document.getElementById("detail-brand").textContent=(item.brand||"Unknown")+(item.model?" "+item.model:"");
  document.getElementById("detail-sub").textContent=[item.subcategory,item.color,item.size_visible].filter(Boolean).join(" · ");
  const sourceBadge = item.isbn ? `ISBN ${item.isbn.slice(-4)}` : item.barcode ? `EAN` : Math.round((item.confidence||0)*100)+"%";
  document.getElementById("detail-badges").innerHTML=[
    {t:item.condition_estimate,c:"green"},
    {t:item.category,c:"gray"},
    {t:sourceBadge,c:item.isbn||item.barcode?"green":"gray"},
  ].map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join("");
  document.getElementById("mkt-price").value="";
  document.getElementById("signal-box").style.display="none";
  updateDetailPrices();
}

function updateDetailPrices() {
  const prices=currentPrices;
  if (!prices) return;

  document.getElementById("detail-price").textContent="€"+prices.weightedMedian;
  document.getElementById("detail-range").textContent=`Range: €${prices.overallP25} – €${prices.overallMedian} median`;

  const realCount=Object.values(prices.platforms||{}).filter(d=>!d.simulated).length;
  const totalCount=Object.keys(prices.platforms||{}).length;
  const note=document.getElementById("detail-note");
  if (prices.enriching) {
    note.style.color="#ffd600";
    note.textContent=realCount>0?`⏳ ${realCount}/${totalCount} live — loading more...`:"⏳ Fetching real prices...";
  } else if (realCount===0) {
    note.style.color="#888"; note.textContent="⚡ Estimated prices";
  } else {
    note.style.color="#00ff87"; note.textContent=`✓ Live from ${realCount} platform${realCount>1?"s":""}`;
  }

  const propColor=prices.propensity>70?"#00ff87":prices.propensity>40?"#ffd600":"#ff4444";
  document.getElementById("prop-pct").textContent=prices.propensity+"%";
  document.getElementById("prop-pct").style.color=propColor;
  document.getElementById("prop-bar").style.width=prices.propensity+"%";
  document.getElementById("prop-bar").style.background=propColor;
  document.getElementById("prop-listings").textContent=prices.totalListings+" active listings";

  document.getElementById("platforms-list").innerHTML=Object.entries(prices.platforms||{}).map(([p,d])=>`
    <div class="platform-row">
      <span style="flex:1;font-size:13px;color:#8080a0">${PLATFORMS[p]?.emoji||""} ${PLATFORMS[p]?.name||p}</span>
      <span style="font-size:17px;font-weight:700;color:${PLATFORMS[p]?.color||"#fff"};margin-right:8px">€${d.median}</span>
      <span style="font-size:10px;color:#444;margin-right:4px">${d.count} items</span>
      <span class="${d.simulated?"est-badge":"live-badge"}">${d.simulated?"est":"live"}</span>
    </div>`).join("");

  document.getElementById("thresholds").innerHTML=
    `<span>✅ Buy if &lt;€${prices.buyThreshold}</span><span>⚠️ Maybe if &lt;€${prices.maybeThreshold}</span>`;
  updateSignal();
}

function updateSignal() {
  const mp=parseFloat(document.getElementById("mkt-price").value);
  const box=document.getElementById("signal-box");
  if (!currentPrices||isNaN(mp)||mp<=0){box.style.display="none";return;}
  const margin=Math.round((currentPrices.weightedMedian-mp)/mp*100);
  let label,icon,color;
  if (mp<=currentPrices.buyThreshold)      {label="BUY";  icon="✅";color="#00ff87";}
  else if(mp<=currentPrices.maybeThreshold){label="MAYBE";icon="⚠️";color="#ffd600";}
  else                                      {label="PASS"; icon="❌";color="#ff4444";}
  box.style.display="block";
  box.style.color=color;box.style.borderColor=color;box.style.background=color+"18";
  box.innerHTML=icon+"<br>"+label+(margin>0?`<div style="font-size:10px;font-weight:400;margin-top:2px">+${margin}%</div>`:"");
}

function shareWhatsApp() {
  if (!currentItem||!currentPrices) return;
  const item=currentItem, prices=currentPrices;
  const label=[item.brand,item.model||item.subcategory].filter(Boolean).join(" ");
  const prop=prices.propensity;
  const propTxt=prop>70?"🔥 High demand":prop>40?"⚠️ Medium demand":"📉 Low demand";
  const mp=document.getElementById("mkt-price").value;
  const mktTxt=mp?`\nSeller asking: €${mp}`:"";
  const buyTxt=mp&&prices.buyThreshold
    ?(parseFloat(mp)<=prices.buyThreshold?"\n✅ GOOD BUY":parseFloat(mp)<=prices.maybeThreshold?"\n⚠️ MAYBE":"\n❌ PASS"):"";
  const plats=Object.entries(prices.platforms)
    .map(([p,d])=>`  ${PLATFORMS[p]?.emoji||""} ${PLATFORMS[p]?.name||p}: €${d.median} ${d.simulated?"(est)":"✓"}`)
    .join("\n");
  const msg=`🏷️ *ThriftLens Scan*\n\n*${label}*\n📦 ${item.subcategory||item.category} · ${item.condition_estimate}\n\n💰 *Avg resale: €${prices.weightedMedian}*\n📊 Range: €${prices.overallP25} – €${prices.overallMedian}${mktTxt}${buyTxt}\n\n${propTxt} (${prop}%)\n\n*By platform:*\n${plats}\n\n_Scanned with ThriftLens · amentinho.github.io/thriftlens_`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}

  }
  barcodeModeActive = true;
  const btn = document.getElementById("barcode-btn");
  btn.style.background = "#ff4444"; btn.textContent = "⏹ CANCEL";
  setStatus("📦 Point at barcode/ISBN then tap 📸");
  // Switch to manual mode so user taps when ready
  clearInterval(scanTimer);
  document.getElementById("manual-btn").style.display = "flex";
}

async function stopBarcodeMode() {
  barcodeModeActive = false;
  const btn = document.getElementById("barcode-btn");
  if (btn) { btn.style.background = "#ffd600"; btn.textContent = "📦 BARCODE"; }
}

async function scanBarcode() {
  const b64 = captureFrame();
  if (!b64) return;

  barcodeModeActive = false;
  stopBarcodeMode();
  document.getElementById("manual-btn").style.display = prefs.autoScan ? "none" : "flex";
  setStatus("🔍 Reading barcode with AI...");
  setScanLine(true);

  try {
    const res = await fetchWithTimeout(WORKER_URL+"/vision", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:[
        {type:"text", text:"Look at this image and find any barcode, ISBN, EAN, or UPC number. Return ONLY JSON: {"barcode":"THE_EXACT_NUMBER","type":"isbn"} or {"barcode":null,"type":"none"} if no barcode visible. Read the digits precisely."},
        {type:"image_url", image_url:{url:"data:image/jpeg;base64,"+b64, detail:"high"}}
      ]}]}),
    }, 15000);

    const data = await res.json();
    const text = (data.choices?.[0]?.message?.content||"{}").replace(/```json|```/g,"").trim();
    const result = JSON.parse(text);
    console.log("AI barcode result:", result);

    if (result.barcode && result.barcode !== "null" && result.barcode.length >= 8) {
      setStatus("✓ " + result.barcode + " — looking up...");
      await lookupBarcode(result.barcode);
    } else {
      setErr("No barcode found. Get closer and ensure barcode is well-lit.");
      setStatus("Tap 📸 to try again");
      if (prefs.autoScan) scanTimer = setInterval(doScan, prefs.interval*1000);
    }
  } catch(e) {
    setErr("Error: " + e.message);
    if (prefs.autoScan) scanTimer = setInterval(doScan, prefs.interval*1000);
  } finally {
    setScanLine(false);
  }
}


async function lookupBarcode(code) {
  setStatus("🔍 Looking up " + code + "...");
  clearInterval(scanTimer);
  let item = null;

  // Open Library (books/ISBN)
  try {
    const res = await fetchWithTimeout("https://openlibrary.org/api/books?bibkeys=ISBN:"+code+"&format=json&jscmd=data", {}, 8000);
    const data = await res.json();
    const book = data["ISBN:"+code];
    if (book) {
      const title   = book.title || "";
      const authors = (book.authors||[]).map(a=>a.name).join(", ");
      item = {
        brand: authors||null, model: title, category:"book", subcategory:"book",
        color:"multicolor", condition_estimate:"good", size_visible:null, gender:"na",
        search_query: title.split(" ").slice(0,4).join(" ")+" libro",
        confidence:0.98, is_luxury:false, is_streetwear_sneaker:false, is_camera_watch_collectible:false,
        isbn:code, year:book.publish_date||"", source:"openlibrary"
      };
      console.log("Open Library:", title, authors);
    }
  } catch(e) { console.warn("Open Library:", e.message); }

  // Google Books fallback
  if (!item) {
    try {
      const res = await fetchWithTimeout("https://www.googleapis.com/books/v1/volumes?q=isbn:"+code, {}, 8000);
      const data = await res.json();
      const vol = data.items?.[0]?.volumeInfo;
      if (vol) {
        const title   = vol.title || "";
        const authors = (vol.authors||[]).join(", ");
        item = {
          brand: authors||null, model: title, category:"book", subcategory:"book",
          color:"multicolor", condition_estimate:"good", size_visible:null, gender:"na",
          search_query: title.split(" ").slice(0,4).join(" ")+" libro",
          confidence:0.97, is_luxury:false, is_streetwear_sneaker:false, is_camera_watch_collectible:false,
          isbn:code, source:"google_books"
        };
        console.log("Google Books:", title, authors);
      }
    } catch(e) { console.warn("Google Books:", e.message); }
  }

  // Discogs (vinyl barcodes)
  if (!item) {
    try {
      const res = await fetchWithTimeout(
        "https://api.discogs.com/database/search?barcode="+code+"&type=release&per_page=3",
        {headers:{"User-Agent":"ThriftLens/1.0"}}, 8000
      );
      const data = await res.json();
      const release = data.results?.[0];
      if (release) {
        const title = release.title || "";
        item = {
          brand: title.split(" - ")[0]||null, model: title.split(" - ")[1]||title,
          category:"vinyl", subcategory:"vinyl record", color:"black",
          condition_estimate:"good", size_visible:null, gender:"na",
          search_query: (title+" vinyl").slice(0,40),
          confidence:0.96, is_luxury:false, is_streetwear_sneaker:false, is_camera_watch_collectible:false,
          barcode:code, year:release.year||"", source:"discogs"
        };
        console.log("Discogs:", title);
      }
    } catch(e) { console.warn("Discogs:", e.message); }
  }

  if (!item) {
    setErr("Barcode "+code+" not found. Try camera scan 📸");
    setStatus(prefs.autoScan ? "⚡ Auto-scanning every "+prefs.interval+"s" : "Tap 📸 to scan");
    if (prefs.autoScan) scanTimer = setInterval(doScan, prefs.interval*1000);
    return;
  }

  setStatus("✓ "+(item.model||item.brand||"Found")+" — fetching prices...");
  const b64 = captureFrame() || "";
  await fetchAndShow(item, b64);
}
