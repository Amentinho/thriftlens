<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080810"/>
  <title>ThriftLens</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#080810;overflow:hidden}
    body{font-family:'DM Mono',monospace;color:#e8e8f0}
    #app{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:430px;margin:0 auto}
    input,button{-webkit-appearance:none;outline:none;font-family:inherit}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{display:none}

    /* Header */
    #header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;
      border-bottom:1px solid #1a1a2e;background:rgba(8,8,16,.97);position:sticky;top:0;z-index:100}
    .logo{font-size:15px;letter-spacing:4px;color:#8080a0;font-weight:300}
    .logo b{color:#00ff87;font-weight:700;letter-spacing:2px}
    .tabs{display:flex;gap:4px}
    .tab{background:transparent;border:1px solid #1a1a2e;color:#666;padding:6px 10px;
      border-radius:6px;cursor:pointer;font-size:11px}
    .tab.active{background:#00ff8710;border-color:#00ff87;color:#00ff87}

    /* Screens */
    .screen{display:none;padding:16px;padding-bottom:60px;animation:fadeIn .3s ease}
    .screen.visible{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes scanline{0%{top:20%}50%{top:75%}100%{top:20%}}

    /* Cards */
    .card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:16px;margin-bottom:12px}
    .lbl{display:block;font-size:10px;letter-spacing:2px;color:#00ff87;margin-bottom:6px;text-transform:uppercase}
    .hint{font-size:11px;color:#555;margin-bottom:10px;line-height:1.6}
    .section-title{font-size:11px;letter-spacing:4px;color:#8080a0;margin-bottom:16px;text-transform:uppercase}

    /* Camera screen */
    #cam-screen{display:none;flex-direction:column}
    #cam-screen.visible{display:flex}
    #cam-wrap{position:relative;width:100%;background:#000;flex-shrink:0}
    #video{width:100%;display:block;max-height:60vh;object-fit:cover}
    #cam-overlay{position:absolute;inset:0;pointer-events:none}
    .corner{position:absolute;width:24px;height:24px;border-color:#00ff87}
    #scan-line{position:absolute;left:12%;right:12%;height:2px;
      background:linear-gradient(90deg,transparent,#00ff87,transparent);
      display:none;animation:scanline 1.8s ease-in-out infinite}
    #cam-status{position:absolute;bottom:0;left:0;right:0;padding:8px 16px;
      background:linear-gradient(transparent,rgba(8,8,16,.9));font-size:12px;color:#00ff87;letter-spacing:1px}
    #manual-btn{position:absolute;bottom:10px;right:12px;width:54px;height:54px;border-radius:50%;
      background:#00ff87;border:none;font-size:26px;cursor:pointer;display:none;
      align-items:center;justify-content:center}

    /* Detail screen */
    #detail-screen{display:none;padding:16px;padding-bottom:120px;animation:fadeIn .3s ease}
    #detail-screen.visible{display:block}
    #detail-thumb{width:88px;height:88px;object-fit:cover;border-radius:12px;
      border:2px solid #1a1a2e;flex-shrink:0}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:1px;margin:2px}
    .badge.green{background:#00ff8715;border:1px solid #00ff8740;color:#00ff87}
    .badge.gray{background:#ffffff08;border:1px solid #2a2a3e;color:#666}
    .big-price{font-size:48px;font-weight:700;color:#e8e8f0;line-height:1}
    .prop-bar-bg{height:8px;background:#080810;border-radius:4px;overflow:hidden;margin:8px 0}
    .prop-bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
    .platform-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #080810}
    .buy-btn{padding:20px 0;border-radius:16px;border:2px solid;font-size:16px;font-weight:700;
      cursor:pointer;letter-spacing:2px;flex:1}
    .buy-btn.yes{border-color:#00ff87;background:#00ff8720;color:#00ff87}
    .buy-btn.no{border-color:#ff4444;background:#ff444420;color:#ff4444}
    .skip-btn{width:100%;margin-top:12px;padding:14px;border-radius:12px;border:1px solid #2a2a3e;
      background:transparent;color:#555;font-size:12px;cursor:pointer}

    /* History */
    .stat-box{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:10px;padding:10px 8px;text-align:center}
    .stat-val{font-size:18px;font-weight:700;line-height:1.2}
    .stat-lbl{font-size:9px;color:#555;margin-top:3px;letter-spacing:1px;text-transform:uppercase}
    .hist-card{display:flex;gap:12px;background:#0d0d1a;border:1px solid #1a1a2e;
      border-radius:12px;padding:12px;margin-bottom:10px}
    .hist-thumb-wrap{position:relative;flex-shrink:0}
    .hist-thumb{width:66px;height:66px;object-fit:cover;border-radius:8px}
    .dec-dot{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

    /* Preferences */
    .chip{padding:7px 14px;border-radius:20px;border:1px solid #2a2a3e;background:transparent;
      color:#666;cursor:pointer;font-size:12px}
    .chip.active{background:#00ff8720;border-color:#00ff87;color:#00ff87}
    .platform-btn{padding:9px 10px;border-radius:8px;border:1px solid #333;background:transparent;
      color:#555;cursor:pointer;font-size:12px;transition:all .2s}
    .toggle-wrap{display:flex;justify-content:space-between;align-items:center}
    .toggle{width:46px;height:24px;border-radius:12px;border:none;cursor:pointer;
      position:relative;padding:2px;display:flex;align-items:center;transition:background .3s}
    .toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
    .cta-btn{width:100%;padding:16px;background:linear-gradient(135deg,#00ff87,#00ccff);
      border:none;border-radius:12px;color:#080810;font-weight:700;font-size:15px;
      cursor:pointer;letter-spacing:2px;margin-top:8px}
    .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .chips-row{display:flex;gap:8px;flex-wrap:wrap}

    /* Misc */
    .err-box{margin:16px;padding:14px;background:#ff444415;border:1px solid #ff444440;
      border-radius:10px;font-size:12px;color:#ff6666}
    .calc-box{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:16px;margin-bottom:16px}
    .price-input{flex:1;background:#080810;border:1px solid #2a2a3e;border-radius:8px;
      padding:12px;color:#e8e8f0;font-size:20px;width:100%}
    .signal-box{padding:10px 14px;border-radius:10px;border:1px solid;font-size:13px;
      font-weight:700;text-align:center;flex-shrink:0;min-width:80px}
    .enrich-note{text-align:center;font-size:10px;padding:8px 0;border-top:1px solid #1a1a2e;margin-bottom:12px}
    .empty{text-align:center;color:#444;padding:60px 20px;font-size:14px}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px}
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo">🏷️ THRIFT<b>LENS</b></div>
    <div class="tabs">
      <button class="tab active" id="tab-cam"    onclick="showScreen('cam')">📷</button>
      <button class="tab"        id="tab-history" onclick="showScreen('history')">🗂 <span id="scan-count"></span></button>
      <button class="tab"        id="tab-prefs"   onclick="showScreen('prefs')">⚙️</button>
    </div>
  </div>

  <!-- CAMERA SCREEN -->
  <div id="cam-screen" class="screen visible">
    <div id="cam-wrap">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div id="cam-overlay">
        <div class="corner" style="position:absolute;top:18%;left:12%;border-top:3px solid;border-left:3px solid"></div>
        <div class="corner" style="position:absolute;top:18%;right:12%;border-top:3px solid;border-right:3px solid"></div>
        <div class="corner" style="position:absolute;bottom:18%;left:12%;border-bottom:3px solid;border-left:3px solid"></div>
        <div class="corner" style="position:absolute;bottom:18%;right:12%;border-bottom:3px solid;border-right:3px solid"></div>
        <div id="scan-line"></div>
      </div>
      <div id="cam-status">Starting camera...</div>
      <button id="manual-btn" onclick="doScan()">📸</button>
    </div>
    <div id="cam-err"></div>
  </div>

  <!-- DETAIL SCREEN -->
  <div id="detail-screen">
    <div style="display:flex;gap:14px;margin-bottom:20px;align-items:flex-start">
      <img id="detail-thumb" src="" alt=""/>
      <div style="flex:1">
        <div id="detail-brand" style="font-size:22px;font-weight:700;line-height:1.2"></div>
        <div id="detail-sub"   style="font-size:12px;color:#8080a0;margin-top:4px"></div>
        <div id="detail-badges" style="margin-top:8px"></div>
      </div>
    </div>

    <div class="card" style="text-align:center;margin-bottom:16px">
      <div style="font-size:10px;letter-spacing:3px;color:#8080a0;text-transform:uppercase;margin-bottom:6px">Weighted Resale Price</div>
      <div class="big-price" id="detail-price">—</div>
      <div id="detail-range" style="font-size:12px;color:#555;margin-top:8px"></div>
      <div id="detail-data-note" class="enrich-note" style="margin-top:8px;border-top:none"></div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:10px;letter-spacing:2px;color:#8080a0;text-transform:uppercase">Sell Propensity</span>
        <span id="prop-pct" style="font-size:16px;font-weight:700"></span>
      </div>
      <div class="prop-bar-bg"><div id="prop-bar" class="prop-bar-fill" style="width:0%"></div></div>
      <div id="prop-listings" style="font-size:11px;color:#555;margin-top:4px"></div>
    </div>

    <div id="platforms-list" class="card" style="padding:4px 0;margin-bottom:16px"></div>

    <div class="calc-box">
      <div style="font-size:10px;letter-spacing:2px;color:#8080a0;text-transform:uppercase;margin-bottom:12px">💶 Seller's asking price</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <input class="price-input" type="number" id="mkt-price" placeholder="€ e.g. 15" oninput="updateSignal()"/>
        <div class="signal-box" id="signal-box" style="display:none"></div>
      </div>
      <div id="thresholds" style="display:flex;justify-content:space-between;font-size:10px;color:#555"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <button class="buy-btn yes" onclick="recordDecision('buy')">✅ BUY</button>
      <button class="buy-btn no"  onclick="recordDecision('pass')">❌ PASS</button>
    </div>
    <button class="skip-btn" onclick="recordDecision(null)">📷 Skip &amp; scan next</button>
  </div>

  <!-- HISTORY SCREEN -->
  <div id="history-screen" class="screen">
    <div class="stats-grid" id="stats-grid" style="display:none"></div>
    <div class="section-title">All Scans</div>
    <div id="history-list"><div class="empty">No scans yet. Go find some deals! 🧺</div></div>
  </div>

  <!-- PREFERENCES SCREEN -->
  <div id="prefs-screen" class="screen">
    <div class="section-title">Preferences</div>

    <div class="card">
      <label class="lbl">Auto-scan interval</label>
      <p class="hint">How often to capture a frame automatically.</p>
      <div class="chips-row" id="interval-chips"></div>
    </div>

    <div class="card toggle-wrap">
      <div>
        <label class="lbl" style="margin-bottom:2px">Auto-scan</label>
        <p class="hint" style="margin-bottom:0">Continuous or manual tap.</p>
      </div>
      <button class="toggle" id="autoscan-toggle" onclick="toggleAutoScan()">
        <div class="toggle-knob" id="toggle-knob"></div>
      </button>
    </div>

    <div class="card">
      <label class="lbl">Active Platforms</label>
      <div class="pgrid" id="platform-grid"></div>
    </div>

    <button class="cta-btn" onclick="showScreen('cam')">📷 Start Scanning</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIG — set your Cloudflare Worker URL after deploying worker.js
// Keys stay in the Worker (never exposed in browser)
// ═══════════════════════════════════════════════════════════════════════════════
const WORKER_URL  = "https://thriftlens.andrea-amenta87.workers.dev";
// Legacy direct keys (only used if no worker set)
const OPENAI_KEY  = "";
const APIFY_TOKEN = "";

const PLATFORMS = {
  ebay:      { name:"eBay EU",   color:"#e53238", emoji:"🛒" },
  vinted:    { name:"Vinted",    color:"#09b1ba", emoji:"👗" },
  depop:     { name:"Depop",     color:"#ff2300", emoji:"🔴" },
  wallapop:  { name:"Wallapop",  color:"#13c1ac", emoji:"🟢" },
  stockx:    { name:"StockX",    color:"#00ff87", emoji:"👟" },
  leboncoin: { name:"LeBonCoin", color:"#f56b2a", emoji:"🇫🇷" },
  subito:    { name:"Subito.it", color:"#cc0033", emoji:"🇮🇹" },
};

const APIFY_ACTORS = {
  vinted:    "kazkn~vinted-smart-scraper",
  depop:     "epctex~depop-scraper",
  wallapop:  "louisdeconinck~wallapop-scraper",
  leboncoin: "apify~leboncoin-scraper",
  subito:    "epctex~subito-scraper",
};

// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
let prefs = { interval:3, autoScan:true, platforms:Object.keys(PLATFORMS) };
try { prefs = { ...prefs, ...JSON.parse(localStorage.getItem("tl_prefs")||"{}") }; } catch(e){}

let currentItem   = null;
let currentPrices = null;
let currentScan   = null;
let currentB64    = null;
let scanning      = false;
let lastScanTime  = 0;
let scanTimer     = null;
let stream        = null;

// ═══════════════════════════════════════════════════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════════════════════════════════════════════════
function openDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open("thriftlens",1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("scans")) {
        const s = db.createObjectStore("scans",{keyPath:"id"});
        s.createIndex("category","category",{unique:false});
        s.createIndex("brand","brand",{unique:false});
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbSave(scan) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const tx = db.transaction("scans","readwrite");
    tx.objectStore("scans").put(scan);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function dbAll() {
  const db = await openDB();
  return new Promise((res,rej) => {
    const req = db.transaction("scans","readonly").objectStore("scans").getAll();
    req.onsuccess = e => res(e.target.result.reverse());
    req.onerror = rej;
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCREEN NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
function showScreen(name) {
  // Hide all
  document.getElementById("cam-screen").classList.remove("visible");
  document.getElementById("detail-screen").classList.remove("visible");
  document.getElementById("history-screen").classList.remove("visible");
  document.getElementById("prefs-screen").classList.remove("visible");
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  if (name === "cam") {
    document.getElementById("cam-screen").classList.add("visible");
    document.getElementById("tab-cam").classList.add("active");
    startCamera();
  } else if (name === "detail") {
    document.getElementById("detail-screen").classList.add("visible");
    document.getElementById("tab-cam").classList.add("active");
    stopCamera();
  } else if (name === "history") {
    document.getElementById("history-screen").classList.add("visible");
    document.getElementById("tab-history").classList.add("active");
    stopCamera();
    renderHistory();
  } else if (name === "prefs") {
    document.getElementById("prefs-screen").classList.add("visible");
    document.getElementById("tab-prefs").classList.add("active");
    stopCamera();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════════════════════
async function startCamera() {
  clearInterval(scanTimer);
  if (stream) return; // already running
  setStatus("Starting camera...");
  try {
    // Try rear camera first, fall back to any camera (desktop compatibility)
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{exact:"environment"}, width:{ideal:1280} }
      });
    } catch(e) {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ width:{ideal:1280} }
      });
    }
    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();
    setStatus(prefs.autoScan ? `⚡ Auto-scanning every ${prefs.interval}s` : "Tap 📸 to scan");
    document.getElementById("manual-btn").style.display = prefs.autoScan ? "none" : "flex";
    if (prefs.autoScan) {
      scanTimer = setInterval(doScan, prefs.interval * 1000);
    }
  } catch(e) {
    setErr("Camera blocked. Open in Safari and allow camera access.\n\n" + e.message);
  }
}

function stopCamera() {
  clearInterval(scanTimer);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function captureFrame() {
  const video  = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  if (!video || video.readyState < 2) return null;
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.82).split(",")[1];
}

function setStatus(msg) {
  const el = document.getElementById("cam-status");
  if (el) el.textContent = msg;
}
function setErr(msg) {
  const el = document.getElementById("cam-err");
  if (el) { el.className = "err-box"; el.textContent = msg; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// VISION
// ═══════════════════════════════════════════════════════════════════════════════
const VISION_PROMPT = `You are a secondhand resale pricing expert for flea markets and thrift stores.
Your job is to identify ANY object that could be resold: clothing, shoes, bags, cameras, watches, books, vinyl records, antiques, electronics, toys, accessories, jewelry, art, furniture, or any other physical item.

Return ONLY valid JSON, no markdown, no explanation:
{
  "brand": "brand/author/publisher or null if none visible",
  "model": "exact model, title, edition or null",
  "category": "clothing|shoes|bag|camera|watch|book|vinyl|electronics|antique|toy|jewelry|accessory|other",
  "subcategory": "specific type e.g. novel, jeans, compact camera, vinyl record, action figure",
  "color": "main color or dominant colors",
  "condition_estimate": "new|excellent|good|fair|poor",
  "size_visible": "size if visible on label or null",
  "gender": "men|women|unisex|unknown|na",
  "search_query": "3-6 words optimized for eBay/Vinted search e.g. 'Alexandra Potter book paperback' or 'Olympus XA film camera'",
  "confidence": 0.9,
  "is_luxury": false,
  "is_streetwear_sneaker": false,
  "is_camera_watch_collectible": false
}

Examples:
- Book visible → brand=author name, model=title, category="book", search_query="[title] [author] paperback"
- Vinyl record → brand=artist, model=album title, category="vinyl"
- Camera → brand=Olympus, model=XA, search_query="Olympus XA compact film camera"
- Clothing with no brand → brand=null, subcategory=garment type, still return full JSON

IMPORTANT: Always return a full JSON object. Only return {"error":"no_item"} if the image is completely blank, a hand with nothing, or totally unidentifiable. If you can see ANY object at all, describe it.`;

async function identifyItem(b64) {
  const messages = [{
    role:"user",
    content:[
      { type:"text", text: VISION_PROMPT },
      { type:"image_url", image_url:{ url:"data:image/jpeg;base64,"+b64, detail:"low" }}
    ]
  }];

  let data;
  if (WORKER_URL && !WORKER_URL.includes("YOUR_WORKER")) {
    // Use Cloudflare Worker proxy (no CORS issues)
    const res = await fetch(WORKER_URL+"/vision", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages}),
      signal:AbortSignal.timeout(20000)
    });
    data = await res.json();
  } else if (OPENAI_KEY) {
    // Direct call (only works on localhost, not GitHub Pages)
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENAI_KEY},
      body:JSON.stringify({model:"gpt-4o",max_tokens:600,messages}),
      signal:AbortSignal.timeout(20000)
    });
    data = await res.json();
  } else {
    throw new Error("No API configured. Set WORKER_URL in the code.");
  }

  if (data.error) throw new Error(data.error.message);
  const text = (data.choices?.[0]?.message?.content||"{}").replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

// ═══════════════════════════════════════════════════════════════════════════════
// PRICE FETCHERS
// ═══════════════════════════════════════════════════════════════════════════════
function simulatePrices(platform, query) {
  const q = query.toLowerCase();
  let base = 22;
  if (/olympus xa/.test(q))           base = 110;
  else if (/olympus mju|stylus/.test(q)) base = 85;
  else if (/canon ae.1/.test(q))      base = 130;
  else if (/leica/.test(q))           base = 800;
  else if (/polaroid/.test(q))        base = 65;
  else if (/rolex/.test(q))           base = 3500;
  else if (/casio/.test(q))           base = 45;
  else if (/seiko/.test(q))           base = 120;
  else if (/film camera|analog/.test(q)) base = 60;
  else if (/nike|adidas/.test(q))     base = 48;
  else if (/levi/.test(q))            base = 34;
  else if (/gucci|prada|hermes/.test(q)) base = 320;
  else if (/zara|h&m|mango/.test(q))  base = 12;
  else if (/jordan|yeezy/.test(q))    base = 190;
  else if (/ralph lauren|lacoste/.test(q)) base = 42;
  else if (/vintage|retro/.test(q))   base *= 1.4;
  if (/jacket|coat/.test(q)) base *= 1.5;
  if (/shoes|sneaker/.test(q)) base *= 1.4;
  const mult = {ebay:.95,vinted:.82,depop:1.1,wallapop:.75,stockx:1.85,leboncoin:.70,subito:.73};
  const m = mult[platform]||1;
  const count = 8 + Math.floor(Math.random()*10);
  const prices = Array.from({length:count},()=>
    Math.round(base*m*(0.7+Math.random()*.65)*100)/100);
  const favorites = Array.from({length:count},()=>Math.floor(Math.random()*20));
  return {prices,favorites,count,simulated:true};
}

async function fetchPlatform(platform, query) {
  try {
    const actor = APIFY_ACTORS[platform];
    if (!actor) return simulatePrices(platform, query);
    const inputs = {
      vinted:    {searchText:query, maxItems:20},
      depop:     {search:query, maxItems:20},
      wallapop:  {keywords:query, maxItems:20},
      leboncoin: {searchQuery:query, maxItems:20},
      subito:    {search:query, maxItems:20},
    };
    const res = await fetch(WORKER_URL+"/apify", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({actor, input:inputs[platform]||{query}}),
      signal:AbortSignal.timeout(30000)
    });
    if (!res.ok) return simulatePrices(platform, query);
    const items = await res.json();
    if (!Array.isArray(items)||!items.length) return simulatePrices(platform, query);
    const prices = items
      .map(i=>parseFloat(String(i.price||i.currentPrice||i.salePrice||0).replace(/[^0-9.]/g,"")))
      .filter(p=>p>1&&p<5000);
    if (!prices.length) return simulatePrices(platform, query);
    const favorites = items.map(i=>i.favouriteCount||i.favourite_count||i.likes||0);
    return {prices, favorites, count:prices.length, simulated:false};
  } catch(e) { return simulatePrices(platform, query); }
}

async function fetchEbay(query) {
  // Routes through worker: uses eBay official API if EBAY_APP_ID set, else HTML scrape
  try {
    const res = await fetch(WORKER_URL+"/ebay", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query}),
      signal:AbortSignal.timeout(10000)
    });
    if (!res.ok) return simulatePrices("ebay", query);
    const data = await res.json();
    if (!data.prices||data.prices.length<2) return simulatePrices("ebay", query);
    return {prices:data.prices, favorites:data.prices.map(()=>0), count:data.prices.length, simulated:false, source:data.source};
  } catch(e) { return simulatePrices("ebay", query); }
}

async function fetchVinted(query)   { return fetchPlatform("vinted",   query); }
async function fetchWallapop(query) { return fetchPlatform("wallapop", query); }
async function fetchApify(platform, query) { return fetchPlatform(platform, query); }


// ═══════════════════════════════════════════════════════════════════════════════
// AGGREGATION
// ═══════════════════════════════════════════════════════════════════════════════
function aggregate(platformData, item) {
  const results = {};
  let allPrices = [];
  for (const [p,d] of Object.entries(platformData)) {
    if (!d?.prices?.length) continue;
    const s = [...d.prices].sort((a,b)=>a-b);
    const median = s[Math.floor(s.length*.5)];
    const p25    = s[Math.floor(s.length*.25)];
    const avgFav = d.favorites.reduce((a,b)=>a+b,0)/(d.favorites.length||1);
    results[p] = {median,p25,avg:s.reduce((a,b)=>a+b,0)/s.length,count:d.count,avgFav,simulated:d.simulated};
    allPrices = allPrices.concat(d.prices);
  }
  if (!allPrices.length) return null;
  const W = {vinted:2.2,depop:1.5,stockx:1.8,ebay:1.1,wallapop:.7,leboncoin:.7,subito:.7};
  let ws=0,wt=0;
  for (const [p,d] of Object.entries(results)) { const w=W[p]||1; ws+=d.median*w; wt+=w; }
  const wm = Math.round(ws/wt*100)/100;
  const as = [...allPrices].sort((a,b)=>a-b);
  const overallP25    = Math.round(as[Math.floor(as.length*.25)]*100)/100;
  const overallMedian = Math.round(as[Math.floor(as.length*.5)]*100)/100;
  const allFavs = Object.values(results).map(r=>r.avgFav);
  const avgFav  = allFavs.reduce((a,b)=>a+b,0)/(allFavs.length||1);
  const totalListings = Object.values(results).reduce((s,r)=>s+r.count,0);
  const demand  = Math.min(avgFav/18,1);
  const supply  = Math.max(1-totalListings/220,.1);
  const bonus   = (item?.is_luxury?.15:0)+(item?.is_streetwear_sneaker?.10:0)+(item?.is_camera_watch_collectible?.08:0);
  const prop    = Math.min(Math.round((demand*.45+supply*.38+bonus+.17)*100),96);
  return {
    platforms:results, weightedMedian:wm, overallP25, overallMedian,
    propensity:prop, totalListings,
    buyThreshold:Math.round(wm*.45*100)/100,
    maybeThreshold:Math.round(wm*.60*100)/100,
    simulated:Object.values(results).some(r=>r.simulated),
    enriching:false  // caller overrides this
  };
}

// MAIN SCAN PIPELINE
// ═══════════════════════════════════════════════════════════════════════════════
async function doScan() {
  const now = Date.now();
  if (scanning || now-lastScanTime < prefs.interval*1000) return;
  const b64 = captureFrame();
  if (!b64) { setErr("Camera not ready"); return; }
  lastScanTime = now;
  scanning = true;
  setScanLine(true);
  document.getElementById("cam-err").textContent = "";
  document.getElementById("cam-err").className = "";

  try {
    if (!WORKER_URL || WORKER_URL.includes("YOUR_WORKER")) {
      throw new Error("WORKER_URL not configured in index.html");
    }

    setStatus("🔍 Sending to GPT-4o...");
    let item;
    try {
      item = await identifyItem(b64);
    } catch(apiErr) {
      throw new Error("Vision API failed: " + apiErr.message);
    }

    console.log("Vision raw result:", item);

    if (item.error) {
      const msg = item.error === "no_item"
        ? "👁 No item detected — point closer"
        : "⚠️ API error: " + item.error;
      setStatus(msg);
      setTimeout(() => setStatus("Tap 📸 to scan"), 3000);
      scanning = false; setScanLine(false); return;
    }

    if (!item.brand && !item.subcategory) {
      setStatus("⚠️ Unrecognised — try different angle");
      setTimeout(() => setStatus("Tap 📸 to scan"), 3000);
      scanning = false; setScanLine(false); return;
    }

    if (item.confidence < 0.40 || !item.brand) {
      scanning = false; setScanLine(false);
      showClarify(item, b64);
      return;
    }

    const label = [item.brand, item.model||item.subcategory].filter(Boolean).join(" ");
    setStatus("✓ " + label + " — fetching prices...");
    await fetchAndShow(item, b64);

  } catch(e) {
    console.error("doScan error:", e);
    setErr("Error: " + e.message);
    setStatus("Tap 📸 to try again");
  } finally {
    scanning = false;
    setScanLine(false);
  }
}


function setScanLine(on) {
  document.getElementById("scan-line").style.display = on ? "block" : "none";
}

async function fetchAndShow(item, b64) {
  const q = item.search_query;
  const raw = {};

  // ── Phase 0: Show simulation INSTANTLY (<10ms) so user sees prices right away
  const simRaw = {};
  for (const p of prefs.platforms) simRaw[p] = simulatePrices(p, q);
  const simAgg = aggregate(simRaw, item);
  if (simAgg) {
    currentItem   = item;
    currentPrices = { ...simAgg, enriching: true, simulated: true };
    currentB64    = b64;
    currentScan   = {
      id: Date.now(), ts: new Date().toISOString(), tsDisplay: new Date().toLocaleTimeString(),
      brand: item.brand||"Unknown", model: item.model||"",
      category: item.category||"other", subcategory: item.subcategory||"",
      color: item.color||"", condition: item.condition_estimate||"good",
      search_query: q, prices: simAgg, thumb: b64, decision: null, mktPrice: null
    };
    renderDetail();
    showScreen("detail");
  }

  // ── Phase 1 + 2: Fire ALL real sources simultaneously, update UI as each arrives
  // Start all platform fetches at once
  const platformFetches = {};
  for (const p of prefs.platforms) {
    if (p === "stockx" && !item.is_streetwear_sneaker) continue;
    if (p === "ebay") platformFetches[p] = fetchEbay(q);
    else platformFetches[p] = fetchPlatform(p, q);
  }

  let realCount = 0;
  const total = Object.keys(platformFetches).length;

  // Update UI progressively as each platform resolves
  const promises = Object.entries(platformFetches).map(async ([p, promise]) => {
    try {
      const result = await promise;
      raw[p] = result;
      if (!result.simulated) realCount++;
    } catch(e) {
      raw[p] = simRaw[p]; // keep simulation for failed platforms
    }
    // Update prices after each platform resolves
    const agg = aggregate(raw, item);
    if (agg) {
      const stillLoading = realCount < total;
      currentPrices = { ...agg, enriching: stillLoading };
      if (currentScan) currentScan.prices = agg;
      updateDetailPrices();
    }
  });

  // Save to DB once all done
  Promise.all(promises).then(() => {
    const finalAgg = aggregate(raw, item);
    if (finalAgg) {
      currentPrices = { ...finalAgg, enriching: false };
      if (currentScan) {
        currentScan.prices = finalAgg;
        dbSave(currentScan).catch(()=>{});
      }
      updateDetailPrices();
    }
  });
}

function renderDetail() {
  const item = currentItem;
  const prices = currentPrices;
  if (!item||!prices) return;

  // Thumb
  const thumb = document.getElementById("detail-thumb");
  thumb.src = currentB64 ? "data:image/jpeg;base64,"+currentB64 : "";

  // Brand / model / sub
  document.getElementById("detail-brand").textContent = (item.brand||"Unknown") + (item.model?" "+item.model:"");
  document.getElementById("detail-sub").textContent = [item.subcategory,item.color,item.size_visible].filter(Boolean).join(" · ");

  // Badges
  const badges = document.getElementById("detail-badges");
  badges.innerHTML = [
    {t:item.condition_estimate,c:"green"},
    {t:item.category,c:"gray"},
    {t:Math.round((item.confidence||0)*100)+"%",c:"gray"},
  ].map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join("");

  updateDetailPrices();
  document.getElementById("mkt-price").value = "";
  document.getElementById("signal-box").style.display = "none";
}

function updateDetailPrices() {
  const prices = currentPrices;
  if (!prices) return;

  document.getElementById("detail-price").textContent = "€"+prices.weightedMedian;
  document.getElementById("detail-range").textContent = `Range: €${prices.overallP25} – €${prices.overallMedian} median`;

  const note = document.getElementById("detail-data-note");
  const realPlatforms = Object.entries(prices.platforms||{}).filter(([p,d])=>!d.simulated).length;
  const totalPlatforms = Object.keys(prices.platforms||{}).length;
  if (prices.enriching) {
    note.style.color="#ffd600";
    note.textContent = realPlatforms > 0
      ? `⏳ ${realPlatforms}/${totalPlatforms} platforms loaded — fetching more...`
      : "⏳ Fetching real prices...";
  } else if (realPlatforms === 0) {
    note.style.color="#555"; note.textContent="⚡ Estimated prices — live fetch unavailable";
  } else if (realPlatforms < totalPlatforms) {
    note.style.color="#ffd600"; note.textContent=`⚡ ${realPlatforms} live + ${totalPlatforms-realPlatforms} estimated`;
  } else {
    note.style.color="#00ff87"; note.textContent=`✓ Live prices from ${realPlatforms} platforms`;
  }

  // Propensity
  const propColor = prices.propensity>70?"#00ff87":prices.propensity>40?"#ffd600":"#ff4444";
  document.getElementById("prop-pct").textContent = prices.propensity+"%";
  document.getElementById("prop-pct").style.color = propColor;
  document.getElementById("prop-bar").style.width  = prices.propensity+"%";
  document.getElementById("prop-bar").style.background = propColor;
  document.getElementById("prop-listings").textContent = prices.totalListings+" active listings";

  // Platform list
  const list = document.getElementById("platforms-list");
  list.innerHTML = Object.entries(prices.platforms).map(([p,d])=>`
    <div class="platform-row">
      <span style="flex:1;font-size:12px;color:#8080a0">${PLATFORMS[p]?.emoji||""} ${PLATFORMS[p]?.name||p}</span>
      <span style="font-size:15px;font-weight:700;color:${PLATFORMS[p]?.color||"#fff"};margin-right:8px">€${d.median}</span>
      <span style="font-size:10px;color:#444;margin-right:6px">${d.count} items</span>
      <span style="font-size:9px;color:${d.simulated?"#444":"#00ff87"}">${d.simulated?"est":"live"}</span>
    </div>`).join("");

  // Thresholds
  document.getElementById("thresholds").innerHTML =
    `<span>✅ Buy if &lt;€${prices.buyThreshold}</span><span>⚠️ Maybe if &lt;€${prices.maybeThreshold}</span>`;

  updateSignal();
}

function updateSignal() {
  const mp = parseFloat(document.getElementById("mkt-price").value);
  const box = document.getElementById("signal-box");
  if (!currentPrices||isNaN(mp)||mp<=0) { box.style.display="none"; return; }
  const margin = Math.round((currentPrices.weightedMedian-mp)/mp*100);
  let label,icon,color;
  if (mp<=currentPrices.buyThreshold)   { label="BUY";   icon="✅"; color="#00ff87"; }
  else if (mp<=currentPrices.maybeThreshold) { label="MAYBE"; icon="⚠️"; color="#ffd600"; }
  else { label="PASS"; icon="❌"; color="#ff4444"; }
  box.style.display="block";
  box.style.color=color; box.style.borderColor=color; box.style.background=color+"18";
  box.innerHTML = icon+"<br>"+label+(margin>0?`<div style="font-size:10px;font-weight:400;margin-top:2px">+${margin}%</div>`:"");
}

      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;margin-bottom:4px">${e.brand||"Unknown"}${e.model?" "+e.model:""}</div>
        <div style="font-size:11px;color:#8080a0;margin-bottom:4px">${e.subcategory||""}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:13px;color:#00ff87">€${e.prices?.weightedMedian||"—"}</span>
          ${e.mktPrice?`<span style="font-size:11px;color:${decColor}">paid €${e.mktPrice}</span>`:""}
        </div>
        <div style="font-size:10px;color:#555">${e.tsDisplay||""}</div>
      </div>
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════════════════════════════════════════════
// PREFERENCES UI
// ═══════════════════════════════════════════════════════════════════════════════
function savePrefs() {
  try { localStorage.setItem("tl_prefs", JSON.stringify(prefs)); } catch(e){}
}

function renderPrefs() {
  // Interval chips
  const chips = document.getElementById("interval-chips");
  chips.innerHTML = [2,3,5,8].map(v=>
    `<button class="chip ${prefs.interval===v?"active":""}" onclick="setInterval_(${v})">${v}s</button>`
  ).join("");

  // Auto-scan toggle
  const tog = document.getElementById("autoscan-toggle");
  const knob = document.getElementById("toggle-knob");
  tog.style.background = prefs.autoScan?"#00ff87":"#333";
  knob.style.transform  = prefs.autoScan?"translateX(22px)":"translateX(0)";

  // Platform grid
  const grid = document.getElementById("platform-grid");
  grid.innerHTML = Object.entries(PLATFORMS).map(([k,p])=>{
    const on = prefs.platforms.includes(k);
    return `<button class="platform-btn" onclick="togglePlat('${k}')" style="border-color:${on?p.color:"#333"};background:${on?p.color+"22":"transparent"};color:${on?p.color:"#555"}">${p.emoji} ${p.name}</button>`;
  }).join("");
}

function setInterval_(v) {
  prefs.interval = v; savePrefs(); renderPrefs();
}
function toggleAutoScan() {
  prefs.autoScan = !prefs.autoScan; savePrefs(); renderPrefs();
}
function togglePlat(k) {
  if (prefs.platforms.includes(k)) prefs.platforms = prefs.platforms.filter(x=>x!==k);
  else prefs.platforms.push(k);
  savePrefs(); renderPrefs();
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
renderPrefs();
startCamera();
</script>
